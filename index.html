<!DOCTYPE html>

<html lang="en">

    <head>
        
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tic Tac Toe</title>
    
    <link rel="stylesheet" href="style.css">

    </head>

    <body>

        <!-- table to hold the game board -->
        <table id = "gameBoard">

            <tr>
                <td class="cell" id="0"></td>
                <td class="cell" id="1"></td>
                <td class="cell" id="2"></td>
            </tr>

            <tr>
                <td class="cell" id="3"></td>
                <td class="cell" id="4"></td>
                <td class="cell" id="5"></td>
            </tr>

            <tr>
                <td class="cell" id="6"></td>
                <td class="cell" id="7"></td>
                <td class="cell" id="8"></td>
            </tr>

        </table>

        <div class="endgame">

            <div class="text"></div>

        </div>

        <!-- player select panel -->
        <div class = "playerSymbolPanel">

            <div class = "symbolPanel">

                <p>Select symbol:</p>

                <button id = "xButton" type = "button">X</button>   <!--onClick = "selectPlayerSymbol('X')">X</button>-->

                <button id = "oButton" type = "button">O</button>   <!--onClick = "selectPlayerSymbol('O')">O</button>-->

            </div>

        </div>
        
        <!-- restart button panel -->
        <div class = "gameButtonPanel">
            
            <div class = "buttonPanel">

                <button id = "restartButton" type = "button">Replay</button>

            </div>

        </div>

    <script src="script.js"></script>

    </body>

</html>
